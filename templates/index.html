<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <title>RecycleIQ</title>

    <link rel="stylesheet" href="/static/style.css">

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body class="dark">

    <!-- TOPBAR -->

    <div class="topbar">

        <h1>♻ RecycleIQ</h1>

        <div class="controls">

            <input
                type="text"
                id="searchBox"
                placeholder="Search Zone..."
                onkeyup="filterZones()"
            >

            <select id="citySelect" onchange="loadCityData()"></select>

            <button onclick="setTheme('dark')">🌙</button>
            <button onclick="setTheme('light')">☀</button>
            <button onclick="setTheme('pink')">💗</button>

        </div>

    </div>

    <!-- STATUS BAR -->

    <div class="status-bar">

        <div id="statusText">
            🟢 System Stable
        </div>

        <div id="clock"></div>

    </div>

    <!-- MAIN -->

    <div class="main-container">

        <!-- LEFT -->

        <div class="left-panel">

            <!-- MAP -->

            <div class="map-container">

                <iframe
                    id="mapFrame"
                    class="map"
                    src="https://www.google.com/maps?q=Bangalore&output=embed">
                </iframe>

                <div id="markers"></div>

            </div>

            <!-- STATS -->

            <div class="stats">

                <div class="stat-card">
                    <h3>Total Waste</h3>
                    <h1 id="totalWaste">0</h1>
                </div>

                <div class="stat-card">
                    <h3>Avg Recycling</h3>
                    <h1 id="avgRecycle">0%</h1>
                </div>

                <div class="stat-card">
                    <h3>High Risk Zones</h3>
                    <h1 id="highRisk">0</h1>
                </div>

            </div>

        </div>

        <!-- RIGHT -->

        <div class="right-panel">

            <!-- HEALTH -->

            <div class="health-card">

                <h2>🏙 City Health Score</h2>

                <h1 id="healthScore">82</h1>

            </div>

            <!-- ALERTS -->

            <div class="alerts">

                <h2>🚨 Live Alerts</h2>

                <div id="alertBox"></div>

            </div>

            <!-- ZONES -->

            <div id="zones"></div>

            <!-- CHART -->

            <canvas id="chart"></canvas>

            <!-- CHATBOT -->

            <div class="chatbot">

                <h2>🧠 RecycleIQ AI</h2>

                <div id="chatMessages"></div>

                <input
                    type="text"
                    id="chatInput"
                    placeholder="Ask something..."
                >

                <button onclick="sendMessage()">
                    Send
                </button>

            </div>

        </div>

    </div>

    <script src="/static/script.js"></script>

</body>

</html>
